<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Note Taking App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: #4a5568;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .note-form {
            padding: 20px;
            background: #f7fafc;
            border-bottom: 2px solid #e2e8f0;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #2d3748;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #cbd5e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.2);
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #4299e1;
            color: white;
        }

        .btn-primary:hover {
            background: #3182ce;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #e53e3e;
            color: white;
        }

        .btn-danger:hover {
            background: #c53030;
            transform: translateY(-2px);
        }

        .notes-container {
            padding: 20px;
        }

        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .note-card {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .note-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.15);
        }

        .note-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 10px;
            border-bottom: 2px solid #4299e1;
            padding-bottom: 5px;
        }

        .note-content {
            color: #4a5568;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .note-date {
            font-size: 0.9rem;
            color: #718096;
            margin-bottom: 15px;
        }

        .note-actions {
            display: flex;
            gap: 10px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #718096;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        @media (max-width: 600px) {
            .container {
                margin: 10px;
                border-radius: 10px;
            }
            
            .notes-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 Simple Note Taker</h1>
            <p>Keep your thoughts organized</p>
        </div>

        <div class="note-form">
            <div class="form-group">
                <label for="note-title">Title</label>
                <input type="text" id="note-title" placeholder="Enter note title...">
            </div>
            <div class="form-group">
                <label for="note-content">Content</label>
                <textarea id="note-content" placeholder="Write your note here..."></textarea>
            </div>
            <button class="btn btn-primary" onclick="addNote()">Add Note</button>
        </div>

        <div class="notes-container">
            <h2>Your Notes</h2>
            <div class="notes-grid" id="notes-grid">
                <div class="empty-state" id="empty-state">
                    <div>📄</div>
                    <p>No notes yet. Add your first note above!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize notes array from localStorage or empty array
        let notes = JSON.parse(localStorage.getItem('notes')) || [];

        // Function to add a new note
        function addNote() {
            const titleInput = document.getElementById('note-title');
            const contentInput = document.getElementById('note-content');
            
            const title = titleInput.value.trim();
            const content = contentInput.value.trim();
            
            if (title === '' || content === '') {
                alert('Please fill in both title and content!');
                return;
            }
            
            const newNote = {
                id: Date.now(), // Unique ID using timestamp
                title: title,
                content: content,
                date: new Date().toLocaleString()
            };
            
            notes.push(newNote);
            saveNotes();
            displayNotes();
            
            // Clear inputs
            titleInput.value = '';
            contentInput.value = '';
            titleInput.focus();
        }

        // Function to delete a note
        function deleteNote(id) {
            if (confirm('Are you sure you want to delete this note?')) {
                notes = notes.filter(note => note.id !== id);
                saveNotes();
                displayNotes();
            }
        }

        // Function to save notes to localStorage
        function saveNotes() {
            localStorage.setItem('notes', JSON.stringify(notes));
        }

        // Function to display all notes
        function displayNotes() {
            const notesGrid = document.getElementById('notes-grid');
            const emptyState = document.getElementById('empty-state');
            
            if (notes.length === 0) {
                notesGrid.innerHTML = '';
                notesGrid.appendChild(emptyState);
                return;
            }
            
            notesGrid.innerHTML = '';
            
            notes.forEach(note => {
                const noteCard = document.createElement('div');
                noteCard.className = 'note-card';
                noteCard.innerHTML = `
                    <div class="note-title">${note.title}</div>
                    <div class="note-date">${note.date}</div>
                    <div class="note-content">${note.content}</div>
                    <div class="note-actions">
                        <button class="btn btn-danger" onclick="deleteNote(${note.id})">Delete</button>
                    </div>
                `;
                notesGrid.appendChild(noteCard);
            });
        }

        // Function to handle Enter key press in content area
        document.getElementById('note-content').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                addNote();
            }
        });

        // Display notes on page load
        document.addEventListener('DOMContentLoaded', displayNotes);
    </script>
</body>
</html>
